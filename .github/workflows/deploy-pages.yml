name: Deploy to GitHub Pages

# Publishes the static export to the gh-pages branch. GitHub automatically
# serves that branch at https://<owner>.github.io/<repo>/ — no repo-settings
# change needed (the Actions-source deployment path requires the Pages site
# to be created via settings first, which the workflow token cannot do).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # API route handlers can't be statically exported. On Pages the AI
      # explainer falls back to its canned demo text client-side.
      - run: rm -rf app/api

      - run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # Adds .nojekyll automatically so the _next/ asset dir is served.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
