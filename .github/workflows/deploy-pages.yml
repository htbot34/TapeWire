name: Deploy to GitHub Pages

# The repo's Pages configuration serves the ROOT of the main branch, so this
# workflow builds the static export and commits the built site into main's
# root (guarded with [skip ci] against retriggering itself). It also mirrors
# the build to a gh-pages branch in case Pages is ever pointed there instead.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # API route handlers can't be statically exported. On Pages the AI
      # explainer falls back to its canned demo text client-side.
      - run: rm -rf app/api

      - run: npm run build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # Mirror to gh-pages (adds .nojekyll automatically) — used if the Pages
      # source is ever switched to that branch.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

      # Publish into main's root — the currently configured Pages source.
      # index.html + .nojekyll make Pages serve the app instead of the
      # Jekyll-rendered README.
      - name: Commit static site to main root
        run: |
          git checkout HEAD -- app/api
          git rm -r -q --ignore-unmatch _next 404 briefing onboarding settings \
            404.html index.html index.txt icon.svg .nojekyll
          cp -r out/. .
          rm -rf out
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Site unchanged — nothing to commit"
          else
            git commit -m "Publish static site to Pages root [skip ci]"
            git push origin main
            # Keep the dev branch in sync too — the repo's Pages source has
            # pointed at it, and serving works from any branch this way.
            git push origin HEAD:claude/tapewire-news-prototype-11h9im \
              || echo "dev branch diverged; skipping sync"
          fi
